<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حيوانات الغابة - نرجس عمران</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        body { font-family: 'Cairo', sans-serif; background-color: #fdfcfe; color: #1e293b; touch-action: manipulation; }
        .page-section { display: none; }
        .page-section.active { display: block; animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animal-img { max-height: 260px; object-fit: contain; border-radius: 2rem; border: 8px solid white; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .btn-magic { background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); color: white; border-radius: 1.25rem; font-weight: bold; transition: transform 0.2s; shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn-magic:active { transform: scale(0.95); }
        .tracing-dots { letter-spacing: 10px; font-size: 2.5rem; color: #e2e8f0; border-bottom: 2px dashed #cbd5e1; font-family: 'Arial', sans-serif; font-weight: bold; }
        .qr-frame { border: 4px dashed #a855f7; padding: 10px; border-radius: 20px; max-width: 150px; margin: 15px auto; background: white; }
        .nav-active { background-color: #9333ea !important; color: white !important; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        /* تحسين مظهر المعلومة */
        #info-box { line-height: 1.6; border-right: 4px solid #a855f7; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <nav class="bg-white/95 backdrop-blur shadow-sm sticky top-0 z-50 p-4">
        <div class="max-w-md mx-auto">
            <div class="flex justify-between items-center mb-4">
                <h1 class="text-2xl font-black text-purple-600">🦁 حيوانات الغابة</h1>
                <span class="text-[10px] bg-amber-100 text-amber-700 px-3 py-1 rounded-full font-bold">نرجس عمران</span>
            </div>
            <div class="flex gap-2 overflow-x-auto pb-2 scrollbar-hide" id="nav-tabs">
                </div>
        </div>
    </nav>

    <main class="flex-grow max-w-md mx-auto w-full p-6" id="main-content">
        </main>

    <script>
        const apiKey = "AIzaSyCWHwOi9sUjLW-FHgwJ_723axMY8Y5SEwE";
        const qrCodeFileName = 'qr-code.png'; 

        const animals = [
            { id: 'cover', name: '🏠 الغلاف' },
            { id: 'guide', name: '📖 الدليل' },
            { id: 'lion', name: 'الأسد', en: 'LION', search: 'عظمة', img: 'Screenshot_20260414-182747_Chrome.jpg' },
            { id: 'owl', name: 'البومة', en: 'OWL', search: 'هلال', img: 'Screenshot_20260414-212533_Chrome.jpg' },
            { id: 'elephant', name: 'الفيل', en: 'ELEPHANT', search: 'نملة', img: 'Screenshot_20260414-213329_Chrome.jpg' },
            { id: 'monkey', name: 'القرد', en: 'MONKEY', search: 'موزة', img: 'Screenshot_20260414-221054_Chrome.jpg' },
            { id: 'giraffe', name: 'الزرافة', en: 'GIRAFFE', search: 'طائر', img: 'images.jpeg' },
            { id: 'gift', name: '🎁 مفاجأة' }
        ];

        // دالة النطق المركزية
        function speak(text, lang = 'ar-SA', onEnd = null) {
            window.speechSynthesis.cancel(); // تنظيف أي صوت سابق
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = lang;
            utterance.rate = 0.85;
            if (onEnd) utterance.onend = onEnd;
            window.speechSynthesis.speak(utterance);
        }

        // دالة جلب المعلومة العلمية (الحقيقة السحرية)
        async function getFact(animalName, id) {
            const displayBox = document.getElementById(`info-${id}`);
            const btn = document.getElementById(`btn-${id}`);
            
            displayBox.innerText = "أبحث في أسرار الغابة... 🧘‍♂️";
            displayBox.classList.remove('hidden');
            btn.disabled = true;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        contents: [{ parts: [{ text: `أعطني معلومة علمية حقيقية ومبهرة وفريدة عن حيوان ${animalName} للأطفال. ابدأ بكلمة "هل تعلم؟". اجعلها باللغة العربية بأسلوب تعليمي راقٍ.` }] }] 
                    })
                });
                const data = await response.json();
                const factText = data.candidates[0].content.parts[0].text;
                
                displayBox.innerText = factText;
                speak(factText, 'ar-SA'); // نطق المعلومة فوراً بالعربية
            } catch (error) {
                displayBox.innerText = "أوه! يبدو أن حكيم الغابة مشغول الآن، حاول لاحقاً.";
            } finally {
                btn.disabled = false;
            }
        }

        const main = document.getElementById('main-content');
        const tabs = document.getElementById('nav-tabs');

        // بناء الواجهة
        animals.forEach((item, idx) => {
            // 1. إنشاء أزرار التنقل
            const tabBtn = document.createElement('button');
            tabBtn.id = `tab-${item.id}`;
            tabBtn.className = `px-5 py-2 whitespace-nowrap rounded-full text-sm font-bold transition-all ${idx === 0 ? 'nav-active' : 'bg-gray-100 text-gray-500'}`;
            tabBtn.innerText = item.name;
            tabBtn.onclick = () => {
                document.querySelectorAll('#nav-tabs button').forEach(b => b.className = 'px-5 py-2 whitespace-nowrap rounded-full text-sm font-bold bg-gray-100 text-gray-500');
                tabBtn.className = 'px-5 py-2 whitespace-nowrap rounded-full text-sm font-bold nav-active';
                document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
                document.getElementById(`S-${item.id}`).classList.add('active');
            };
            tabs.appendChild(tabBtn);

            // 2. إنشاء الصفحات
            const section = document.createElement('section');
            section.id = `S-${item.id}`;
            section.className = `page-section min-h-[70vh] flex flex-col ${idx === 0 ? 'active' : ''}`;

            if(item.id === 'cover') {
                section.innerHTML = `<div class="text-center my-auto space-y-6">
                    <div class="text-7xl">🎨</div>
                    <h1 class="text-5xl font-black text-gray-800 leading-tight">حيوانات الغابة</h1>
                    <p class="text-xl text-purple-600 font-bold italic">مغامرة الألوان الذكية</p>
                    <div class="bg-purple-50 p-6 rounded-3xl border-2 border-purple-100 italic text-purple-700 font-bold shadow-inner">
                        "إلى طفلي المبدع.. أنت فنان الغابة الصغير" ❤️
                    </div>
                </div>`;
            } else if(item.id === 'guide') {
                section.innerHTML = `<div class="bg-white rounded-3xl p-6 shadow-xl border border-gray-50">
                    <h2 class="text-2xl font-black text-purple-600 mb-6 text-center underline decoration-dotted underline-offset-8">📖 دليل المغامر الصغير</h2>
                    <div class="space-y-6 text-lg text-gray-700">
                        <div class="flex gap-4 items-center bg-gray-50 p-3 rounded-2xl"><span>🎨</span> <p>لون حيوانك في الكتاب.</p></div>
                        <div class="flex gap-4 items-center bg-gray-50 p-3 rounded-2xl"><span>📱</span> <p>امسح الكود لتجد الصورة هنا.</p></div>
                        <div class="flex gap-4 items-center bg-gray-50 p-3 rounded-2xl"><span>🔈</span> <p>اسمع الاسم بالإنجليزي.</p></div>
                        <div class="flex gap-4 items-center bg-gray-50 p-3 rounded-2xl"><span>✨</span> <p>اكتشف أسرار الغابة بالعربي!</p></div>
                    </div>
                    <div class="mt-10 pt-6 border-t text-center">
                        <p class="text-xs font-bold text-gray-400 mb-4 tracking-widest uppercase">كود الوصول السريع</p>
                        <div class="qr-frame"><img src="${qrCodeFileName}" alt="QR" class="w-full h-auto"></div>
                    </div>
                </div>`;
            } else if(item.id === 'gift') {
                section.innerHTML = `<div class="text-center my-auto space-y-8">
                    <div class="text-8xl">🎁</div>
                    <h2 class="text-3xl font-black text-gray-800">أحسنت يا بطل!</h2>
                    <button onclick="speak('أحسنت يا فناننا الصغير، نحن نحبك وفخورون بك جداً', 'ar-SA', () => { speak('Well done little artist, we are so proud of you!', 'en-US'); })" 
                        class="btn-magic text-xl px-10 py-6 shadow-2xl">
                        اضغط لاستلام رسالة المحبة ❤️
                    </button>
                    <p class="text-gray-400 text-sm italic">لقد أكملت جميع التحديات بنجاح!</p>
                </div>`;
            } else {
                section.innerHTML = `
                    <div class="flex justify-between items-center mb-6">
                        <div>
                            <h2 class="text-4xl font-black text-gray-800">${item.name}</h2>
                            <p class="text-purple-400 uppercase font-black text-xl tracking-tighter">${item.en}</p>
                        </div>
                        <button onclick="speak('${item.en}', 'en-US')" class="bg-purple-600 text-white w-14 h-14 rounded-full shadow-lg flex items-center justify-center text-2xl hover:bg-purple-700">🔈</button>
                    </div>
                    <div class="flex-grow flex flex-col items-center justify-center bg-gray-50 rounded-[2.5rem] p-4 mb-6 border-4 border-white shadow-inner relative overflow-hidden">
                        <img src="${item.img}" class="animal-img mb-4" alt="${item.name}">
                        <div id="info-${item.id}" class="bg-white/95 p-4 rounded-2xl text-purple-900 font-bold text-sm hidden shadow-sm border-r-4 border-purple-500 text-center mx-2"></div>
                    </div>
                    <div class="space-y-6">
                        <div class="text-center"><span class="tracing-dots uppercase">${item.en}</span></div>
                        <button id="btn-${item.id}" onclick="getFact('${item.name}', '${item.id}')" class="btn-magic p-5 text-xl shadow-lg">✨ معلومة سحرية</button>
                        <p class="text-center text-gray-400 font-bold text-xs uppercase tracking-widest">🔍 مهمة: ابحث عن ${item.search}</p>
                    </div>`;
            }
            main.appendChild(section);
        });
    </script>
</body>
</html>
