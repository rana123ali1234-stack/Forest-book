<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حيوانات الغابة - نرجس عمران</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Comic+Neue:wght@700&display=swap');
        body { font-family: 'Cairo', sans-serif; background-color: #fdfcfe; color: #1e293b; overflow-x: hidden; }
        .page-section { display: none; opacity: 0; transition: opacity 0.3s ease; }
        .page-section.active { display: block; opacity: 1; }
        .animal-img { max-height: 280px; object-fit: contain; border-radius: 2rem; border: 8px solid white; box-shadow: 0 10px 15px rgba(0,0,0,0.1); }
        .btn-magic { background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); transition: 0.3s; color: white; border-radius: 1.25rem; font-weight: bold; width: 100%; }
        .tracing-dots { font-family: 'Comic Neue', cursive; color: #e2e8f0; border-bottom: 2px dashed #cbd5e1; letter-spacing: 8px; font-size: 2.8rem; text-transform: uppercase; }
        .heart-beat { animation: heart-beat 1.5s infinite; }
        @keyframes heart-beat { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        .qr-frame { border: 4px dashed #a855f7; padding: 8px; border-radius: 20px; max-width: 140px; margin: 15px auto; background: white; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <nav class="bg-white/90 backdrop-blur shadow-md sticky top-0 z-50 p-3">
        <div class="max-w-xl mx-auto flex flex-col gap-2">
            <div class="flex justify-between items-center">
                <h1 class="text-xl font-bold text-purple-600">🦁 حيوانات الغابة</h1>
                <span class="text-[10px] bg-purple-100 px-2 py-1 rounded">نرجس عمران</span>
            </div>
            <div class="flex gap-2 overflow-x-auto" id="nav-tabs"></div>
        </div>
    </nav>

    <main class="flex-grow max-w-xl mx-auto w-full p-5" id="main-content"></main>

    <script>
        const apiKey = "AIzaSyCWHwOi9sUjLW-FHgwJ_723axMY8Y5SEwE";
        const qrCodeFileName = 'qr-code.png'; 

        const animals = [
            { id: 'cover', name: '🏠 الغلاف' },
            { id: 'guide', name: '📖 الدليل' },
            { id: 'lion', name: 'الأسد', en: 'LION', search: 'عظمة', img: 'Screenshot_20260414-182747_Chrome.jpg' },
            { id: 'owl', name: 'البومة', en: 'OWL', search: 'هلال', img: 'Screenshot_20260414-212533_Chrome.jpg' },
            { id: 'elephant', name: 'الفيل', en: 'ELEPHANT', search: 'نملة', img: 'Screenshot_20260414-213329_Chrome.jpg' },
            { id: 'monkey', name: 'القرد', en: 'MONKEY', search: 'موزة', img: 'Screenshot_20260414-221054_Chrome.jpg' },
            { id: 'giraffe', name: 'الزرافة', en: 'GIRAFFE', search: 'طائر', img: 'images.jpeg' },
            { id: 'gift', name: '🎁 مفاجأة' }
        ];

        // دالة النطق الشاملة
        function speak(text, lang = 'en-US', onEnd = null) {
            window.speechSynthesis.cancel(); // إلغاء أي صوت معلق لضمان النطق الفوري
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = lang;
            utterance.rate = 0.8;
            if (onEnd) utterance.onend = onEnd; // تنفيذ دالة بعد انتهاء النطق
            window.speechSynthesis.speak(utterance);
        }

        async function getFact(animalName, id) {
            const box = document.getElementById(`info-${id}`);
            const btn = document.getElementById(`btn-${id}`);
            btn.innerText = "أسأل حكيم الغابة... 🧘‍♂️";
            btn.disabled = true;
            box.innerText = "لحظة واحدة..";
            box.classList.remove('hidden');
            
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        contents: [{ parts: [{ text: `أعطني معلومة علمية حقيقية ومبهرة وقصيرة جداً عن حيوان ${animalName} للأطفال باللغة العربية. ابدأ بكلمة "هل تعلم؟" واجعلها مشوقة وقيمة.` }] }] 
                    })
                });
                const data = await response.json();
                const factText = data.candidates[0].content.parts[0].text;
                box.innerText = factText;
                speak(factText, 'ar-SA'); // نطق المعلومة بالعربية فور ظهورها
            } catch (e) { 
                box.innerText = "حدث خطأ في جلب السر السحري، حاول مرة أخرى!"; 
                speak(box.innerText, 'ar-SA');
            }
            btn.innerText = "✨ معلومة سحرية";
            btn.disabled = false;
        }

        const main = document.getElementById('main-content');
        const tabs = document.getElementById('nav-tabs');

        animals.forEach((item, idx) => {
            const btn = document.createElement('button');
            btn.className = `px-4 py-1.5 whitespace-nowrap rounded-full text-sm font-bold ${idx===0?'bg-purple-600 text-white shadow-lg':'bg-gray-100'}`;
            btn.innerText = item.name;
            btn.onclick = () => {
                document.querySelectorAll('#nav-tabs button').forEach(b => { b.classList.remove('bg-purple-600', 'text-white', 'shadow-lg'); b.classList.add('bg-gray-100'); });
                btn.classList.remove('bg-gray-100'); btn.classList.add('bg-purple-600', 'text-white', 'shadow-lg');
                document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
                document.getElementById(`S-${item.id}`).classList.add('active');
            };
            tabs.appendChild(btn);

            const sec = document.createElement('section');
            sec.id = `S-${item.id}`;
            sec.className = `page-section bg-white rounded-3xl p-6 shadow-lg min-h-[65vh] flex flex-col ${idx===0?'active':''}`;

            if(item.id === 'cover') {
                sec.innerHTML = `<div class="text-center my-auto">
                    <h1 class="text-5xl font-black text-gray-800 mb-4 leading-tightheart-beat">حيوانات الغابة</h1>
                    <p class="text-xl text-purple-600 font-bold mb-6">مغامرة الألوان الذكية</p>
                    <div class="bg-purple-50 p-4 rounded-xl border-2 border-purple-100 italic text-purple-700 font-bold shadow-inner">"إلى طفلي المبدع.. أنت فنان الغابة الصغير" ❤️</div>
                    <p class="text-xs text-gray-300 mt-10">تصميم: نرجس عمران</p>
                </div>`;
            } else if(item.id === 'guide') {
                sec.innerHTML = `<h2 class="text-2xl font-bold text-purple-600 mb-5">📖 كيف نلعب؟</h2>
                    <div class="space-y-4 text-gray-700">
                        <p>🎨 لون حيوانك في الكتاب.</p>
                        <p>📱 امسح الكود لتجده هنا.</p>
                        <p>🔈 اضغط لسماع النطق الإنجليزي.</p>
                        <p>🎁 اضغط للمعلومات السحرية بالعربية!</p>
                    </div>
                    <div class="mt-8 border-t pt-5 text-center">
                        <p class="text-sm text-purple-600 font-bold mb-3">شارك المرح مع أصدقائك!</p>
                        <div class="qr-frame"><img src="${qrCodeFileName}" alt="QR" class="w-full"></div>
                    </div>`;
            } else if(item.id === 'gift') {
                sec.innerHTML = `<div class="text-center my-auto">
                    <div class="text-7xl mb-4 heart-beat">🥳</div>
                    <h2 class="text-3xl font-bold mb-6 text-gray-800">أحسنت يا بطل!</h2>
                    <button id="gift-btn" 
                        onclick="speak('أحسنت يا فناننا الصغير، نحن نحبك وفخورون بك جداً', 'ar-SA', () => { speak('Great job little artist, we love you and we are so proud of you!', 'en-US'); })" 
                        class="btn-magic text-lg px-8 py-5">
                        🎁 استلم الهدية (باللغتين)
                    </button>
                </div>`;
            } else {
                sec.innerHTML = `
                    <div class="flex justify-between items-center mb-6 border-b pb-3">
                        <div><h2 class="text-3xl font-bold text-gray-800">${item.name}</h2><p class="text-gray-400 uppercase font-bold text-xl tracking-wider">${item.en}</p></div>
                        <button onclick="speak('${item.en}', 'en-US')" class="bg-purple-600 text-white w-12 h-12 rounded-full shadow-lg text-2xl flex items-center justify-center">🔈</button>
                    </div>
                    <div class="flex-grow flex flex-col items-center justify-center bg-gray-50 rounded-2xl p-4 mb-4 border border-gray-100 shadow-inner relative">
                        <img src="${item.img}" class="animal-img mb-4">
                        <div id="info-${item.id}" class="bg-white/95 backdrop-blur p-4 rounded-xl text-purple-800 font-bold text-sm hidden shadow-sm border border-purple-100 text-center text-xs"></div>
                    </div>
                    <div class="space-y-4">
                        <div class="text-center tracing-dots uppercase">${item.en}</div>
                        <button id="btn-${item.id}" onclick="getFact('${item.name}', '${item.id}')" class="btn-magic p-4 text-lg">✨ معلومة سحرية</button>
                        <p class="text-center text-gray-400 text-xs">🔍 مهمة: ابحث عن ${item.search}</p>
                    </div>`;
            }
            main.appendChild(sec);
        });
    </script>
</body>
</html>
