<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مرسم نرجس عمران</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        body { font-family: 'Cairo', sans-serif; background: #fdfcfe; overflow: hidden; touch-action: none; }
        .page-section { display: none; }
        .active { display: flex !important; flex-direction: column; }
        
        /* منطقة الرسم */
        .canvas-wrapper { position: relative; width: 300px; height: 300px; margin: 10px auto; background: white; border-radius: 20px; border: 5px solid #9333ea; overflow: hidden; }
        canvas { position: absolute; top: 0; left: 0; z-index: 20; touch-action: none; }
        .bg-img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain; z-index: 10; pointer-events: none; opacity: 0.6; }

        /* الألوان */
        .palette { display: flex; justify-content: center; gap: 10px; background: white; padding: 15px; border-top: 2px solid #f3e8ff; position: fixed; bottom: 0; width: 100%; z-index: 50; }
        .color-btn { width: 40px; height: 40px; border-radius: 50%; border: 3px solid #eee; }
        .selected { border-color: #9333ea; transform: scale(1.1); }
        .nav-btn { padding: 8px 15px; border-radius: 20px; font-size: 12px; font-weight: bold; background: #f3f4f6; white-space: nowrap; }
        .nav-active { background: #9333ea; color: white; }
    </style>
</head>
<body class="flex flex-col min-h-screen">

    <nav class="p-4 bg-white shadow-sm sticky top-0 z-50">
        <div class="flex justify-between items-center mb-3">
            <h1 class="text-xl font-black text-purple-600">🎨 مرسم حيوانات الغابة</h1>
        </div>
        <div id="tabs" class="flex gap-2 overflow-x-auto pb-2 scrollbar-hide"></div>
    </nav>

    <main id="pages" class="flex-grow p-4"></main>

    <div id="controls" class="palette shadow-lg">
        <button class="color-btn bg-red-500" onclick="setPaint('#ef4444', this)"></button>
        <button class="color-btn bg-blue-500" onclick="setPaint('#3b82f6', this)"></button>
        <button class="color-btn bg-yellow-400" onclick="setPaint('#facc15', this)"></button>
        <button class="color-btn bg-green-500" onclick="setPaint('#22c55e', this)"></button>
        <button class="color-btn bg-orange-500" onclick="setPaint('#f97316', this)"></button>
        <button class="text-2xl px-2" onclick="setEraser()">🧽</button>
        <button class="text-2xl px-2" onclick="resetCanvas()">🗑️</button>
    </div>

    <script>
        const qrImg = "chrome_qrcode_1776215174727.png";
        let activeColor = '#ef4444';
        let isEraser = false;
        let ctx, canvas;

        const data = [
            { id: 'home', name: '🏠 البداية' },
            { id: 'lion', name: 'الأسد', en: 'LION', search: 'العظمة', img: 'Screenshot_20260414-182747_Chrome.jpg', fact: 'الأسد هو ملك الغابة القوي' },
            { id: 'owl', name: 'البومة', en: 'OWL', search: 'الهلال', img: 'Screenshot_20260414-212533_Chrome.jpg', fact: 'البومة تسهر في الليل' },
            { id: 'elephant', name: 'الفيل', en: 'ELEPHANT', search: 'النملة', img: 'Screenshot_20260414-213329_Chrome.jpg', fact: 'الفيل لديه خرطوم طويل' },
            { id: 'gift', name: '🎁 هدية' }
        ];

        function init() {
            const tabContainer = document.getElementById('tabs');
            const pageContainer = document.getElementById('pages');

            data.forEach((item, index) => {
                // إنشاء الأزرار
                const btn = document.createElement('button');
                btn.className = `nav-btn ${index === 0 ? 'nav-active' : ''}`;
                btn.innerText = item.name;
                btn.id = 't-' + item.id;
                btn.onclick = () => showPage(item.id);
                tabContainer.appendChild(btn);

                // إنشاء الصفحات
                const div = document.createElement('div');
                div.id = 'p-' + item.id;
                div.className = `page-section h-full ${index === 0 ? 'active' : ''}`;

                if(item.id === 'home') {
                    div.innerHTML = `<div class="text-center my-auto"><h2 class="text-3xl font-bold mb-4">أهلاً بك يا فنان!</h2><img src="https://img.freepik.com/free-vector/jungle-landscape-with-wild-animals_23-2148130040.jpg" class="rounded-2xl shadow mb-4"><p class="text-purple-600 font-bold">بصمة المبدعة: نرجس عمران</p></div>`;
                } else if(item.id === 'gift') {
                    div.innerHTML = `<div class="text-center my-auto"><h2 class="text-3xl font-black mb-6">أنت رائع!</h2><button onclick="talk('Excellent work my little hero', 'en-US')" class="bg-purple-600 text-white p-4 rounded-2xl w-full font-bold">اسمع رسالة الهدية 🎁</button><img src="${qrImg}" class="w-32 mx-auto mt-10 rounded shadow"></div>`;
                } else {
                    div.innerHTML = `
                        <div class="flex justify-between items-center mb-2">
                            <h3 class="text-2xl font-black">${item.name}</h3>
                            <button onclick="talk('${item.en}', 'en-US')" class="bg-purple-100 p-2 rounded-full">🔈</button>
                        </div>
                        <div class="canvas-wrapper">
                            <img src="${item.img}" class="bg-img">
                            <canvas id="c-${item.id}" width="300" height="300"></canvas>
                        </div>
                        <div class="text-center">
                            <p class="text-xs font-bold text-orange-500">🔍 ابحث عن: ${item.search}</p>
                            <button onclick="talk('${item.fact}', 'ar-SA')" class="text-purple-500 text-sm underline mt-2">اسمع الحقيقة السحرية ✨</button>
                        </div>`;
                }
                pageContainer.appendChild(div);
            });
            showPage('home');
        }

        function showPage(id) {
            document.querySelectorAll('.page-section').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('nav-active'));
            document.getElementById('p-' + id).classList.add('active');
            document.getElementById('t-' + id).classList.add('nav-active');
            document.getElementById('controls').style.display = (id === 'home' || id === 'gift') ? 'none' : 'flex';
            
            if(id !== 'home' && id !== 'gift') setupCanvas('c-' + id);
        }

        function setupCanvas(canvasId) {
            canvas = document.getElementById(canvasId);
            ctx = canvas.getContext('2d');
            ctx.lineCap = 'round';
            ctx.lineWidth = 12;

            const draw = (e) => {
                if(e.buttons !== 1 && e.type !== 'touchmove') return;
                const rect = canvas.getBoundingClientRect();
                const x = (e.clientX || e.touches[0].clientX) - rect.left;
                const y = (e.clientY || e.touches[0].clientY) - rect.top;
                
                ctx.globalCompositeOperation = isEraser ? 'destination-out' : 'source-over';
                ctx.strokeStyle = activeColor;
                ctx.lineTo(x, y);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(x, y);
            };

            canvas.onmousedown = (e) => { ctx.beginPath(); draw(e); };
            canvas.onmousemove = draw;
            canvas.ontouchstart = (e) => { e.preventDefault(); ctx.beginPath(); draw(e); };
            canvas.ontouchmove = (e) => { e.preventDefault(); draw(e); };
        }

        function setPaint(color, btn) {
            isEraser = false; activeColor = color;
            document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            // تنشيط محرك الصوت
            window.speechSynthesis.speak(new SpeechSynthesisUtterance(""));
        }

        function setEraser() { isEraser = true; }
        function resetCanvas() { ctx.clearRect(0, 0, canvas.width, canvas.height); }

        function talk(txt, lang) {
            window.speechSynthesis.cancel();
            const m = new SpeechSynthesisUtterance(txt);
            m.lang = lang;
            m.rate = 0.8;
            window.speechSynthesis.speak(m);
        }

        window.onload = init;
    </script>
</body>
</html>
