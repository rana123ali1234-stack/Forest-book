<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مرسم نرجس عمران - النسخة المثالية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        body { font-family: 'Cairo', sans-serif; background: #fdfcfe; overflow-x: hidden; scroll-behavior: smooth; }
        
        .page-view { 
            min-height: 100vh; width: 100vw; display: flex; flex-direction: column; 
            padding-bottom: 120px; border-bottom: 10px dashed #f3e8ff; position: relative;
        }

        /* حركة الترحيب (نبضتين فقط عند الظهور) */
        .welcome-pulse { animation: pulseTwice 1.2s ease-in-out 2; }
        @keyframes pulseTwice {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .canvas-container { 
            position: relative; width: 320px; height: 320px; margin: 10px auto; 
            background: white; border-radius: 30px; border: 8px solid #a855f7; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden; touch-action: none;
        }
        canvas { position: absolute; top: 0; left: 0; z-index: 30; cursor: crosshair; }
        .animal-img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain; z-index: 10; pointer-events: none; opacity: 0.7; }

        /* ميزة التتبع (اسم الحيوان الإنجليزي) */
        .trace-text { 
            font-family: Arial, sans-serif; font-size: 3.5rem; letter-spacing: 6px; 
            color: transparent; -webkit-text-stroke: 2px #cbd5e1; 
            font-weight: 900; position: absolute; top: 50%; left: 50%; 
            transform: translate(-50%, -50%); z-index: 5; pointer-events: none;
            text-transform: uppercase;
        }

        .toolbar { display: flex; justify-content: center; gap: 10px; background: rgba(255,255,255,0.95); padding: 15px; border-top: 3px solid #f3e8ff; position: fixed; bottom: 0; width: 100%; z-index: 100; backdrop-filter: blur(8px); }
        .dot { width: 44px; height: 44px; border-radius: 50%; border: 3px solid white; box-shadow: 0 3px 6px rgba(0,0,0,0.1); }
        .active-dot { border-color: #a855f7; transform: scale(1.15); }
        .hidden-fact { display: none; }
    </style>
</head>
<body onload="init()">

    <section class="page-view text-center bg-purple-50">
        <div class="my-auto">
            <h1 class="text-4xl font-black text-purple-700 mb-6">مرسم الغابة الذكي</h1>
            <img src="https://img.freepik.com/free-vector/wild-animals-coloring-page_23-2148854378.jpg" class="w-72 mx-auto rounded-3xl shadow-2xl welcome-pulse mb-8">
            <p class="text-xl font-bold text-purple-400 italic">نرجس عمران</p>
            <p class="mt-4 animate-bounce text-gray-400">اسحب للأعلى 👇</p>
        </div>
    </section>

    <section class="page-view text-center px-6">
        <div class="my-auto">
            <h2 class="text-3xl font-black mb-6 text-purple-600">كيف نلعب؟ 📖</h2>
            <div class="space-y-4 text-right">
                <p class="bg-white p-4 rounded-2xl shadow-sm border-r-8 border-purple-500 font-bold">🎨 تتبع الاسم ولون الحيوان</p>
                <p class="bg-white p-4 rounded-2xl shadow-sm border-r-8 border-blue-500 font-bold">🔈 اضغط لسماع الاسم بالإنجليزية</p>
                <p class="bg-white p-4 rounded-2xl shadow-sm border-r-8 border-orange-500 font-bold">✨ اكتشف الحقائق خلف النجوم</p>
            </div>
        </div>
    </section>

    <div id="animal-pages"></div>

    <section class="page-view text-center bg-purple-50 px-6">
        <div class="my-auto">
            <h2 class="text-6xl mb-4">🎁</h2>
            <h3 class="text-2xl font-black mb-6 text-purple-700">أنت رسام رائع!</h3>
            
            <div id="song-box" class="hidden-fact bg-white p-4 rounded-3xl shadow-inner mb-4 text-sm border-2 border-purple-200">
                <p class="text-purple-800 font-bold mb-2">كلمات الأغنية:</p>
                <p class="italic">الألوان جميلة، والحيوانات سعيدة.. الرسم مع نرجس ممتع جداً!</p>
            </div>

            <button onclick="showSong()" class="bg-purple-600 text-white w-full py-5 rounded-3xl font-bold shadow-2xl text-xl mb-6">🎶 اسمع أغنية نرجس 🎶</button>
            
            <div class="bg-white p-4 rounded-2xl shadow-lg border w-32 mx-auto">
                <img src="chrome_qrcode_1776215174727.png" class="w-full">
            </div>
        </div>
    </section>

    <div class="toolbar">
        <button class="dot bg-red-500 active-dot" onclick="pickColor('#ef4444', this)"></button>
        <button class="dot bg-blue-500" onclick="pickColor('#3b82f6', this)"></button>
        <button class="dot bg-yellow-400" onclick="pickColor('#facc15', this)"></button>
        <button class="dot bg-green-500" onclick="pickColor('#22c55e', this)"></button>
        <button class="text-3xl" onclick="setEraser()">🧽</button>
        <button class="text-3xl" onclick="clearCurrent()">🗑️</button>
    </div>

    <script>
        let currentColor = '#ef4444', eraser = false, contexts = [];
        const bookData = [
            { name: 'الأسد', en: 'LION', search: 'العظمة', img: 'Screenshot_20260414-182747_Chrome.jpg', factAr: 'الأسد ملك الغابة وهو قوي جداً', factEn: 'The lion is the king of the jungle' },
            { name: 'البومة', en: 'OWL', search: 'الهلال', img: 'Screenshot_20260414-212533_Chrome.jpg', factAr: 'البومة تنام نهاراً وتستيقظ ليلاً', factEn: 'The owl wakes up at night' },
            { name: 'الفيل', en: 'ELEPHANT', search: 'النملة', img: 'Screenshot_20260414-213329_Chrome.jpg', factAr: 'الفيل له خرطوم طويل وذاكرة ذكية', factEn: 'The elephant has a smart memory' },
            { name: 'القرد', en: 'MONKEY', search: 'الموزة', img: 'Screenshot_20260414-221054_Chrome.jpg', factAr: 'القرد يحب القفز وأكل الموز', factEn: 'The monkey loves eating bananas' },
            { name: 'الزرافة', en: 'GIRAFFE', search: 'العصفورة', img: 'images.jpeg', factAr: 'الزرافة لها رقبة طويلة جداً', factEn: 'The giraffe has a very long neck' }
        ];

        function init() {
            const container = document.getElementById('animal-pages');
            bookData.forEach((p, i) => {
                const sec = document.createElement('section');
                sec.className = 'page-view';
                sec.innerHTML = `
                    <div class="p-4 flex justify-between items-center bg-white shadow-sm sticky top-0 z-50">
                        <h2 class="text-3xl font-black text-purple-700">${p.name}</h2>
                        <button onclick="talk('${p.en}', 'en-US')" class="bg-purple-100 p-3 rounded-full text-2xl">🔈</button>
                    </div>
                    <div class="canvas-container welcome-pulse">
                        <div class="trace-text">${p.en}</div>
                        <img src="${p.img}" class="animal-img">
                        <canvas id="canvas-${i}" width="320" height="320"></canvas>
                    </div>
                    <div class="text-center px-6 mt-4">
                        <div class="bg-orange-50 text-orange-600 p-2 rounded-2xl font-bold mb-3 italic text-xs">🔍 ابحث عن: ${p.search}</div>
                        <div id="fact-box-${i}" class="hidden-fact bg-purple-50 p-3 rounded-2xl border border-purple-200 mb-3">
                            <p class="text-purple-800 text-sm font-bold">${p.factAr}</p>
                            <p class="text-gray-400 text-[10px] italic">${p.factEn}</p>
                        </div>
                        <button onclick="showFact(${i}, '${p.factEn}')" class="bg-purple-600 text-white px-8 py-3 rounded-2xl font-bold shadow-lg flex items-center mx-auto gap-2 text-sm">
                            <span>✨ اضغط للحقائق السحرية ✨</span>
                        </button>
                    </div>
                `;
                container.appendChild(sec);
                setupCanvas(i);
            });
        }

        function setupCanvas(idx) {
            setTimeout(() => {
                const cvs = document.getElementById('canvas-'+idx);
                const ctx = cvs.getContext('2d');
                ctx.lineCap = 'round'; ctx.lineWidth = 15;
                contexts.push(ctx);

                const getPos = (e) => {
                    const r = cvs.getBoundingClientRect();
                    const cx = e.touches ? e.touches[0].clientX : e.clientX;
                    const cy = e.touches ? e.touches[0].clientY : e.clientY;
                    return { x: cx - r.left, y: cy - r.top };
                };

                const start = (e) => { 
                    if(e.type === 'touchstart') e.preventDefault();
                    const {x, y} = getPos(e);
                    ctx.beginPath(); ctx.moveTo(x, y);
                    cvs.isDrawing = true;
                };

                const move = (e) => {
                    if(!cvs.isDrawing) return;
                    if(e.type === 'touchmove') e.preventDefault();
                    const {x, y} = getPos(e);
                    ctx.globalCompositeOperation = eraser ? 'destination-out' : 'source-over';
                    ctx.strokeStyle = currentColor;
                    ctx.lineTo(x, y); ctx.stroke();
                };

                const stop = () => { cvs.isDrawing = false; };

                cvs.addEventListener('mousedown', start);
                cvs.addEventListener('mousemove', move);
                window.addEventListener('mouseup', stop);
                cvs.addEventListener('touchstart', start, {passive: false});
                cvs.addEventListener('touchmove', move, {passive: false});
                cvs.addEventListener('touchend', stop);
            }, 600);
        }

        function showFact(idx, msg) {
            document.getElementById('fact-box-'+idx).style.display = 'block';
            talk(msg, 'en-US');
        }

        function showSong() {
            document.getElementById('song-box').style.display = 'block';
            talk("Yellow and Red, Green and Blue. Coloring with Narjes is so much fun!", "en-US");
        }

        function pickColor(c, btn) { 
            eraser = false; currentColor = c; 
            document.querySelectorAll('.dot').forEach(d => d.classList.remove('active-dot'));
            btn.classList.add('active-dot');
        }
        function setEraser() { eraser = true; document.querySelectorAll('.dot').forEach(d => d.classList.remove('active-dot')); }
        function clearCurrent() { contexts.forEach(ctx => ctx.clearRect(0,0,320,320)); }

        function talk(msg, lang) {
            window.speechSynthesis.cancel();
            const s = new SpeechSynthesisUtterance(msg);
            s.lang = lang; s.rate = 0.8;
            window.speechSynthesis.speak(s);
        }
    </script>
</body>
</html>
