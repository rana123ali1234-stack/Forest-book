<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>كتاب نرجس الملون</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        body { font-family: 'Cairo', sans-serif; background: #fdfcfe; overflow: hidden; touch-action: none; }
        .page-view { display: none; height: 100vh; flex-direction: column; }
        .page-view.active { display: flex; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        /* حركة النبض والترحيب */
        .welcome-jump { animation: jump-once 0.8s ease-out; }
        @keyframes jump-once { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1) translateY(-10px); } }

        .canvas-box { 
            position: relative; width: 300px; height: 300px; margin: 10px auto; 
            background: white; border-radius: 25px; border: 6px solid #a855f7; overflow: hidden;
        }
        canvas { position: absolute; top: 0; left: 0; z-index: 30; touch-action: none; background: transparent; }
        .animal-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain; z-index: 10; pointer-events: none; opacity: 0.6; }

        .palette-bar { display: flex; justify-content: center; gap: 10px; background: white; padding: 15px; border-top: 2px solid #f3e8ff; position: fixed; bottom: 0; width: 100%; z-index: 100; }
        .color-dot { width: 40px; height: 40px; border-radius: 50%; border: 3px solid #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .color-dot.active-clr { border-color: #a855f7; transform: scale(1.1); }
        .nav-link { padding: 8px 15px; border-radius: 20px; font-size: 12px; font-weight: bold; background: #f3f4f6; white-space: nowrap; }
        .nav-link.tab-on { background: #a855f7; color: white; }
    </style>
</head>
<body onload="initApp()">

    <nav class="bg-white p-3 shadow-sm sticky top-0 z-[110]">
        <div id="tab-row" class="flex gap-2 overflow-x-auto pb-1 no-scrollbar"></div>
    </nav>

    <main id="app-container" class="flex-grow"></main>

    <div id="paint-tools" class="palette-bar">
        <button class="color-dot bg-red-500 active-clr" onclick="setColor('#ef4444', this)"></button>
        <button class="color-dot bg-blue-500" onclick="setColor('#3b82f6', this)"></button>
        <button class="color-dot bg-yellow-400" onclick="setColor('#facc15', this)"></button>
        <button class="color-dot bg-green-500" onclick="setColor('#22c55e')"></button>
        <button class="text-2xl" onclick="setEraser()">🧽</button>
        <button class="text-2xl" onclick="clearAll()">🗑️</button>
        <button class="bg-purple-100 px-4 py-1 rounded-xl text-purple-700 font-bold text-xs" onclick="goNext()">التالي ➔</button>
    </div>

    <script>
        const qrPath = "chrome_qrcode_1776215174727.png";
        let curColor = '#ef4444', isErase = false, activeCtx;
        let currentIndex = 0;

        const pages = [
            { id: 'cover', name: '🏠 البداية' },
            { id: 'lion', name: 'الأسد', en: 'LION', search: 'العظمة', img: 'Screenshot_20260414-182747_Chrome.jpg', info: 'الأسد هو ملك الغابة وزئيره قوي جداً' },
            { id: 'owl', name: 'البومة', en: 'OWL', search: 'الهلال', img: 'Screenshot_20260414-212533_Chrome.jpg', info: 'البومة ترى في الظلام وتراقب الغابة' },
            { id: 'elephant', name: 'الفيل', en: 'ELEPHANT', search: 'النملة', img: 'Screenshot_20260414-213329_Chrome.jpg', info: 'الفيل لديه ذاكرة قوية ويحب أصدقاءه' },
            { id: 'monkey', name: 'القرد', en: 'MONKEY', search: 'الموزة', img: 'Screenshot_20260414-221054_Chrome.jpg', info: 'القرد ذكي جداً ويحب القفز والمرح' },
            { id: 'giraffe', name: 'الزرافة', en: 'GIRAFFE', search: 'العصفورة', img: 'images.jpeg', info: 'الزرافة هي أطول حيوان في العالم' },
            { id: 'gift', name: '🎁 الهدية' }
        ];

        function initApp() {
            const tabs = document.getElementById('tab-row');
            const main = document.getElementById('app-container');

            pages.forEach((p, i) => {
                const btn = document.createElement('button');
                btn.className = `nav-link ${i===0?'tab-on':''}`;
                btn.innerText = p.name;
                btn.id = 't-'+p.id;
                btn.onclick = () => showPage(i);
                tabs.appendChild(btn);

                const sec = document.createElement('section');
                sec.id = 'p-'+p.id;
                sec.className = `page-view ${i===0?'active':''}`;

                if(p.id === 'cover') {
                    sec.innerHTML = `<div class="text-center p-6 my-auto"><h1 class="text-3xl font-black mb-4">حيوانات الغابة</h1><img src="https://img.freepik.com/free-vector/jungle-landscape-with-wild-animals_23-2148130040.jpg" class="rounded-3xl mb-6 shadow-lg border-4 border-white"><p class="text-purple-600 font-bold italic">تصميم المبدعة نرجس عمران</p></div>`;
                } else if(p.id === 'gift') {
                    sec.innerHTML = `<div class="text-center p-6 my-auto"><h2 class="text-4xl mb-6">🎁</h2><h3 class="text-2xl font-bold mb-6 text-purple-700">عمل رائع يا بطل!</h3><button onclick="speak('Great job, we are proud of you', 'en-US')" class="bg-purple-600 text-white p-4 rounded-2xl w-full font-bold shadow-lg">اسمع رسالة المحبة ❤️</button><img src="${qrPath}" class="w-32 mx-auto mt-10 rounded shadow border"></div>`;
                } else {
                    sec.innerHTML = `
                        <div class="p-4 flex justify-between items-center">
                            <div><h2 class="text-2xl font-black text-gray-800">${p.name}</h2><p class="text-purple-400 text-xs font-bold uppercase">${p.en}</p></div>
                            <button onclick="speak('${p.en}', 'en-US')" class="bg-purple-600 text-white w-10 h-10 rounded-full shadow text-sm">🔈</button>
                        </div>
                        <div class="canvas-box" id="box-${p.id}">
                            <img src="${p.img}" class="animal-bg">
                            <canvas id="c-${p.id}" width="300" height="300"></canvas>
                        </div>
                        <div class="text-center px-4">
                            <div class="bg-orange-50 text-orange-600 py-1 rounded-xl font-bold mb-2 text-sm">🔍 ابحث عن: ${p.search}</div>
                            <div id="txt-${p.id}" class="hidden bg-purple-50 p-2 rounded-lg text-purple-800 text-xs font-bold mb-2"></div>
                            <button onclick="showFact('${p.id}', '${p.info}')" class="text-purple-600 font-bold underline text-sm">✨ اسمع الحقيقة السحرية</button>
                        </div>`;
                }
                main.appendChild(sec);
            });
            showPage(0);
        }

        function showPage(idx) {
            currentIndex = idx;
            document.querySelectorAll('.page-view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(b => b.classList.remove('tab-on'));
            
            const p = pages[idx];
            document.getElementById('p-'+p.id).classList.add('active');
            document.getElementById('t-'+p.id).classList.add('tab-on');
            
            document.getElementById('paint-tools').style.display = (p.id==='cover'||p.id==='gift')?'none':'flex';
            
            if(p.id!=='cover' && p.id!=='gift') {
                const box = document.getElementById('box-'+p.id);
                box.classList.remove('welcome-jump');
                void box.offsetWidth; 
                box.classList.add('welcome-jump');
                initCanvas('c-'+p.id);
            }
        }

        function goNext() {
            let next = currentIndex + 1;
            if(next >= pages.length) next = 0;
            showPage(next);
        }

        function initCanvas(cid) {
            const canv = document.getElementById(cid);
            activeCtx = canv.getContext('2d');
            activeCtx.lineCap = 'round';
            activeCtx.lineWidth = 12;

            const draw = (e) => {
                if(e.buttons !== 1 && e.type !== 'touchmove') return;
                const r = canv.getBoundingClientRect();
                const x = (e.clientX || e.touches[0].clientX) - r.left;
                const y = (e.clientY || e.touches[0].clientY) - r.top;
                activeCtx.globalCompositeOperation = isErase?'destination-out':'source-over';
                activeCtx.strokeStyle = curColor;
                activeCtx.lineTo(x, y); activeCtx.stroke();
                activeCtx.beginPath(); activeCtx.moveTo(x, y);
            };

            canv.onmousedown = (e) => { activeCtx.beginPath(); draw(e); };
            canv.onmousemove = draw;
            canv.ontouchstart = (e) => { e.preventDefault(); activeCtx.beginPath(); draw(e); };
            canv.ontouchmove = (e) => { e.preventDefault(); draw(e); };
        }

        function showFact(id, msg) {
            const el = document.getElementById('txt-'+id);
            el.innerText = msg;
            el.classList.remove('hidden');
            speak(msg, 'ar-SA');
        }

        function setColor(c, btn) {
            isErase = false; curColor = c;
            document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active-clr'));
            if(btn) btn.classList.add('active-clr');
            window.speechSynthesis.speak(new SpeechSynthesisUtterance(""));
        }

        function setEraser() { isErase = true; document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active-clr')); }
        function clearAll() { if(activeCtx) activeCtx.clearRect(0,0,300,300); }

        function speak(t, l) {
            window.speechSynthesis.cancel();
            const s = new SpeechSynthesisUtterance(t);
            s.lang = l; s.rate = 0.8;
            window.speechSynthesis.speak(s);
        }
    </script>
</body>
</html>
