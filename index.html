<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حيوانات الغابة - نرجس عمران</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Comic+Neue:wght@700&display=swap');
        body { font-family: 'Cairo', sans-serif; background-color: #fdfcfe; color: #1e293b; }
        .page-section { display: none; }
        .page-section.active { display: block; animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; scale: 0.95; } to { opacity: 1; scale: 1; } }
        .animal-img { max-height: 320px; object-fit: contain; border-radius: 2.5rem; border: 8px solid white; box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
        .tracing-dots { font-family: 'Comic Neue', cursive; color: #e2e8f0; border-bottom: 3px dashed #cbd5e1; letter-spacing: 8px; font-size: 3.5rem; }
        .btn-magic { background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); transition: 0.3s; }
        .heart-beat { animation: heart-beat 1.5s infinite; }
        @keyframes heart-beat { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <nav class="bg-white/90 backdrop-blur-sm shadow-md sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 py-3 flex flex-col gap-2">
            <div class="flex justify-between items-center">
                <h1 class="text-xl font-bold text-purple-600">🦁 حيوانات الغابة</h1>
                <span class="text-[10px] bg-amber-100 text-amber-700 px-2 py-1 rounded-full font-bold">نرجس عمران</span>
            </div>
            <div class="flex gap-2 overflow-x-auto pb-2 scrollbar-hide" id="nav-tabs"></div>
        </div>
    </nav>

    <main class="flex-grow max-w-4xl mx-auto w-full p-4 sm:p-8" id="main-content"></main>

    <script>
        const apiKey = "AIzaSyCWHwOi9sUjLW-FHgwJ_723axMY8Y5SEwE";
        
        const animals = [
            { id: 'cover', name: '🏠 الغلاف', type: 'special' },
            { id: 'guide', name: '📖 الدليل', type: 'special' },
            { id: 'lion', name: 'الأسد', en: 'LION', search: 'عظمة', img: 'Screenshot_20260414-182747_Chrome.jpg' },
            { id: 'owl', name: 'البومة', en: 'OWL', search: 'هلال', img: 'Screenshot_20260414-212533_Chrome.jpg' },
            { id: 'elephant', name: 'الفيل', en: 'ELEPHANT', search: 'نملة', img: 'Screenshot_20260414-213329_Chrome.jpg' },
            { id: 'monkey', name: 'القرد', en: 'MONKEY', search: 'موزة', img: 'Screenshot_20260414-221054_Chrome.jpg' },
            { id: 'giraffe', name: 'الزرافة', en: 'GIRAFFE', search: 'طائر', img: 'images.jpeg' },
            { id: 'gift', name: '🎁 مفاجأة', type: 'special' }
        ];

        function speak(text, lang = 'en-US', callback = null) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = lang;
            utterance.rate = 0.8;
            if (callback) utterance.onend = callback;
            window.speechSynthesis.speak(utterance);
        }

        async function getFact(animalName, id) {
            const box = document.getElementById(`info-${id}`);
            box.innerText = "أنتظر حكيم الغابة...";
            box.classList.remove('hidden');
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: `أعطني معلومة مدهشة وحقيقية جداً عن ${animalName} للأطفال، ابدأ بـ 'هل تعلم؟'.` }] }] })
                });
                const data = await response.json();
                const factText = data.candidates[0].content.parts[0].text;
                box.innerText = factText;
                speak(factText, 'ar-SA');
            } catch (e) { 
                box.innerText = "أنت طفل مبدع ومميز!"; 
                speak(box.innerText, 'ar-SA');
            }
        }

        const main = document.getElementById('main-content');
        const tabs = document.getElementById('nav-tabs');

        animals.forEach((item, idx) => {
            const btn = document.createElement('button');
            btn.className = `px-5 py-2 whitespace-nowrap rounded-full text-sm font-bold transition ${idx===0?'bg-purple-600 text-white shadow-lg':'bg-white border text-slate-600'}`;
            btn.innerText = item.name;
            btn.onclick = () => {
                document.querySelectorAll('#nav-tabs button').forEach(b=>b.className='px-5 py-2 whitespace-nowrap rounded-full text-sm font-bold bg-white border text-slate-600');
                btn.className = 'px-5 py-2 whitespace-nowrap rounded-full text-sm font-bold bg-purple-600 text-white shadow-lg';
                document.querySelectorAll('.page-section').forEach(s=>s.classList.remove('active'));
                document.getElementById(`S-${item.id}`).classList.add('active');
            };
            tabs.appendChild(btn);

            const sec = document.createElement('section');
            sec.id = `S-${item.id}`;
            sec.className = `page-section bg-white rounded-[3rem] shadow-2xl p-8 mb-10 min-h-[75vh] flex flex-col relative overflow-hidden ${idx===0?'active':''}`;

            if(item.id === 'cover') {
                sec.innerHTML = `<div class="flex-grow flex flex-col items-center justify-center text-center space-y-6">
                    <div class="text-8xl heart-beat">🎨</div>
                    <h1 class="text-6xl font-black text-slate-900 leading-tight">حيوانات الغابة</h1>
                    <p class="text-2xl text-purple-600 font-bold italic">مغامرة الألوان الذكية</p>
                    <div class="bg-purple-50 p-4 rounded-2xl border-2 border-purple-100 italic text-purple-700 font-bold">"إلى طفلي المبدع.. أنت فنان الغابة الصغير" ❤️</div>
                    <p class="text-slate-400 font-bold tracking-widest text-xs uppercase">إعداد وتصميم: نرجس عمران</p>
                </div>`;
            } else if(item.id === 'guide') {
                sec.innerHTML = `<h2 class="text-3xl font-black text-purple-600 mb-6 text-center">📖 دليل الصديق الصغير</h2>
                    <div class="space-y-5 text-lg text-slate-700">
                        <p class="flex gap-2"><span>✨</span> لون حيوانك في الكتاب.</p>
                        <p class="flex gap-2"><span>📱</span> امسح الكود لتجده هنا.</p>
                        <p class="flex gap-2"><span>🔈</span> اضغط لسماع النطق الإنجليزي.</p>
                        <p class="flex gap-2"><span>🎁</span> اكتشف أسرار الغابة بالصوت العربي!</p>
                    </div>`;
            } else if(item.id === 'gift') {
                sec.innerHTML = `
                    <div class="flex-grow flex flex-col items-center justify-center text-center space-y-8">
                        <div class="text-8xl">🥳</div>
                        <h2 class="text-4xl font-black text-slate-900 leading-snug text-center px-4">أحسنت يا بطل! <br> لقد أتممت الرحلة بنجاح</h2>
                        <button onclick="speak('أحسنت يا فناننا الصغير، نحن نحبك وفخورون بك جداً', 'ar-SA', () => { speak('Great job little artist! We are so proud of you!', 'en-US') })" 
                            class="btn-magic text-white px-10 py-5 rounded-full font-bold text-xl shadow-xl flex flex-col items-center gap-1">
                            <span>🎁 استلم رسالة المحبة</span>
                            <span class="text-xs opacity-80">(عربي + English)</span>
                        </button>
                    </div>`;
            } else {
                sec.innerHTML = `
                    <div class="flex justify-between items-start mb-6">
                        <div><h2 class="text-4xl font-black text-slate-800">${item.name}</h2><p class="text-slate-400 font-bold uppercase">${item.en}</p></div>
                        <button onclick="speak('${item.en}', 'en-US')" class="bg-purple-600 text-white p-4 rounded-full shadow-lg">🔈</button>
                    </div>
                    <div class="flex-grow flex flex-col items-center justify-center bg-slate-50 rounded-[2.5rem] p-4 border-4 border-white shadow-inner">
                        <img src="${item.img}" class="animal-img mb-4">
                        <div id="info-${item.id}" class="bg-white/90 p-4 rounded-2xl text-purple-800 font-bold text-sm hidden shadow-sm border border-purple-100 text-center"></div>
                    </div>
                    <div class="mt-8 space-y-4">
                        <div class="text-center"><span class="tracing-dots uppercase">${item.en}</span></div>
                        <button id="btn-${item.id}" onclick="getFact('${item.name}', '${item.id}')" class="w-full btn-magic text-white py-4 rounded-2xl font-bold text-lg shadow-lg">✨ معلومة سحرية</button>
                        <p class="text-center text-slate-400 font-bold text-xs pt-2">🔍 مهمة: ابحث عن ${item.search}</p>
                    </div>`;
            }
            main.appendChild(sec);
        });
    </script>
</body>
</html>
