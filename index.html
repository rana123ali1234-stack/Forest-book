<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مدينة الألوان - نرجس عمران</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Comic+Neue:wght@700&display=swap');
        body { font-family: 'Cairo', sans-serif; background-color: #f0f4f8; color: #1e293b; }
        .page-section { display: none; }
        .page-section.active { display: block; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animal-img { max-height: 350px; object-fit: contain; border-radius: 2rem; cursor: pointer; transition: 0.3s; }
        .animal-img:hover { transform: scale(1.02); }
        .btn-magic { background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); transition: 0.3s; }
        .btn-magic:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(168, 85, 247, 0.4); }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <nav class="bg-white/80 backdrop-blur-md shadow-sm border-b sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 py-3 flex flex-col gap-3">
            <div class="flex justify-between items-center">
                <h1 class="text-xl font-bold text-purple-600">🎨 مدينة الألوان</h1>
                <span class="text-xs bg-purple-100 text-purple-700 px-3 py-1 rounded-full font-bold">بصمة: نرجس عمران</span>
            </div>
            <div class="flex gap-2 overflow-x-auto pb-2" id="nav-tabs"></div>
        </div>
    </nav>

    <main class="flex-grow max-w-4xl mx-auto w-full p-4 sm:p-8" id="main-content"></main>

    <script>
        const apiKey = "AIzaSyCWHwOi9sUjLW-FHgwJ_723axMY8Y5SEwE";
        
        const animals = [
            { id: 'cover', name: 'الغلاف', type: 'special' },
            { id: 'lion', name: 'الأسد', en: 'LION', search: 'عظمة', img: 'Screenshot_20260414-182747_Chrome.jpg' },
            { id: 'owl', name: 'البومة', en: 'OWL', search: 'هلال', img: 'Screenshot_20260414-212533_Chrome.jpg' },
            { id: 'elephant', name: 'الفيل', en: 'ELEPHANT', search: 'نملة', img: 'Screenshot_20260414-213329_Chrome.jpg' },
            { id: 'monkey', name: 'القرد', en: 'MONKEY', search: 'موزة', img: 'Screenshot_20260414-221054_Chrome.jpg' },
            { id: 'giraffe', name: 'الزرافة', en: 'GIRAFFE', search: 'طائر', img: 'images.jpeg' }
        ];

        function speak(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            utterance.rate = 0.8;
            window.speechSynthesis.speak(utterance);
        }

        async function getFact(animalName, elementId) {
            const btn = document.getElementById(`btn-${elementId}`);
            const infoBox = document.getElementById(`info-${elementId}`);
            btn.innerText = "جاري التفكير...";
            
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: `أعطني حقيقة واحدة ممتعة وقصيرة جداً عن حيوان ${animalName} للأطفال باللغة العربية.` }] }] })
                });
                const data = await response.json();
                const fact = data.candidates[0].content.parts[0].text;
                infoBox.innerText = fact;
                infoBox.classList.remove('hidden');
            } catch (error) {
                infoBox.innerText = "أنا أحب اللعب مع الأطفال!";
                infoBox.classList.remove('hidden');
            }
            btn.innerText = "✨ معلومة سحرية";
        }

        const main = document.getElementById('main-content');
        const tabs = document.getElementById('nav-tabs');

        animals.forEach((item, idx) => {
            const btn = document.createElement('button');
            btn.className = `px-5 py-2 whitespace-nowrap rounded-full text-sm font-bold transition ${idx===0?'bg-purple-600 text-white shadow-lg':'bg-white border text-slate-600'}`;
            btn.innerText = item.name;
            btn.onclick = () => {
                document.querySelectorAll('#nav-tabs button').forEach(b=>b.className='px-5 py-2 whitespace-nowrap rounded-full text-sm font-bold bg-white border text-slate-600');
                btn.className = 'px-5 py-2 whitespace-nowrap rounded-full text-sm font-bold bg-purple-600 text-white shadow-lg';
                document.querySelectorAll('.page-section').forEach(s=>s.classList.remove('active'));
                document.getElementById(`S-${item.id}`).classList.add('active');
            };
            tabs.appendChild(btn);

            const sec = document.createElement('section');
            sec.id = `S-${item.id}`;
            sec.className = `page-section bg-white rounded-[2.5rem] shadow-xl p-6 mb-10 min-h-[70vh] flex flex-col ${idx===0?'active':''}`;

            if(item.id === 'cover') {
                sec.innerHTML = `<div class="flex-grow flex flex-col items-center justify-center text-center space-y-6">
                    <div class="text-7xl mb-4">✨</div>
                    <h1 class="text-5xl font-black text-slate-900">مدينة الألوان</h1>
                    <p class="text-xl text-purple-600 font-bold">مغامرة ذكية لكل طفل</p>
                    <p class="text-slate-400 text-sm">بصمة المبدعة نرجس عمران</p>
                </div>`;
            } else {
                sec.innerHTML = `
                    <div class="text-center mb-6">
                        <h2 class="text-4xl font-black text-slate-800">${item.name}</h2>
                        <button onclick="speak('${item.en}')" class="mt-2 text-purple-600 font-bold flex items-center justify-center w-full gap-2">
                            <span class="bg-purple-100 px-4 py-1 rounded-full text-sm">🔈 اسمع النطق: ${item.en}</span>
                        </button>
                    </div>

                    <div class="flex-grow flex flex-col items-center justify-center relative bg-slate-50 rounded-[2rem] p-4 overflow-hidden">
                        <img src="${item.img}" class="animal-img shadow-lg" alt="${item.name}">
                        <div class="mt-4 p-3 bg-purple-50 rounded-xl text-purple-800 text-sm font-bold hidden w-full text-center" id="info-${item.id}"></div>
                    </div>

                    <div class="mt-6 flex flex-col gap-3">
                        <button id="btn-${item.id}" onclick="getFact('${item.name}', '${item.id}')" class="btn-magic text-white py-3 rounded-2xl font-bold">✨ معلومة سحرية</button>
                        <div class="text-center text-slate-400 text-xs font-bold tracking-widest mt-2 border-t pt-4">🔍 ابحث عن: ${item.search}</div>
                    </div>
                `;
            }
            main.appendChild(sec);
        });
    </script>
</body>
</html>
