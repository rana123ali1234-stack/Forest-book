<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حيوانات الغابة - نرجس عمران</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        body { font-family: 'Cairo', sans-serif; background-color: #fdfcfe; color: #1e293b; -webkit-tap-highlight-color: transparent; }
        .page-section { display: none; }
        .page-section.active { display: block; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
        .animal-img { max-height: 250px; border-radius: 2.5rem; border: 8px solid white; box-shadow: 0 15px 30px rgba(0,0,0,0.1); }
        .btn-magic { background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); color: white; border-radius: 1.5rem; font-weight: bold; padding: 16px; width: 100%; transition: 0.3s; box-shadow: 0 4px 15px rgba(168, 85, 247, 0.4); }
        .btn-magic:active { transform: scale(0.95); }
        .tracing-dots { letter-spacing: 8px; font-size: 2.5rem; color: #e2e8f0; border-bottom: 3px dashed #cbd5e1; font-family: sans-serif; font-weight: bold; }
        .qr-frame { border: 4px dashed #a855f7; padding: 12px; border-radius: 25px; max-width: 170px; margin: 20px auto; background: white; }
        .nav-active { background-color: #9333ea !important; color: white !important; transform: scale(1.05); shadow: 0 4px 10px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <nav class="bg-white/95 backdrop-blur shadow-md sticky top-0 z-50 p-4">
        <div class="max-w-md mx-auto flex flex-col gap-3">
            <div class="flex justify-between items-center">
                <h1 class="text-2xl font-black text-purple-600">🦁 حيوانات الغابة</h1>
                <span class="text-[10px] bg-amber-100 text-amber-700 px-3 py-1 rounded-full font-bold">بصمة: نرجس عمران</span>
            </div>
            <div class="flex gap-2 overflow-x-auto pb-2 scrollbar-hide" id="nav-tabs"></div>
        </div>
    </nav>

    <main class="flex-grow max-w-md mx-auto w-full p-6" id="main-content"></main>

    <script>
        const apiKey = "AIzaSyCWHwOi9sUjLW-FHgwJ_723axMY8Y5SEwE";
        const qrCodeFileName = 'qr-code.png'; 

        const animals = [
            { id: 'cover', name: '🏠 الغلاف' },
            { id: 'guide', name: '📖 الدليل' },
            { id: 'lion', name: 'الأسد', en: 'LION', search: 'عظمة', img: 'Screenshot_20260414-182747_Chrome.jpg' },
            { id: 'owl', name: 'البومة', en: 'OWL', search: 'هلال', img: 'Screenshot_20260414-212533_Chrome.jpg' },
            { id: 'elephant', name: 'الفيل', en: 'ELEPHANT', search: 'نملة', img: 'Screenshot_20260414-213329_Chrome.jpg' },
            { id: 'monkey', name: 'القرد', en: 'MONKEY', search: 'موزة', img: 'Screenshot_20260414-221054_Chrome.jpg' },
            { id: 'giraffe', name: 'الزرافة', en: 'GIRAFFE', search: 'طائر', img: 'images.jpeg' },
            { id: 'gift', name: '🎁 مفاجأة' }
        ];

        function speak(text, lang = 'ar-SA', onEnd = null) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = lang;
            utterance.rate = 0.85;
            if (onEnd) utterance.onend = onEnd;
            window.speechSynthesis.speak(utterance);
        }

        async function getFact(animalName, id) {
            const displayBox = document.getElementById(`info-${id}`);
            displayBox.innerText = "جاري استدعاء حكيم الغابة... 🧘‍♂️";
            displayBox.classList.remove('hidden');

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        contents: [{ parts: [{ text: `أعطني معلومة علمية حقيقية واحدة مذهلة ومختصرة عن حيوان ${animalName} للأطفال. ابدأ بـ "هل تعلم؟".` }] }] 
                    })
                });
                const data = await response.json();
                const factText = data.candidates[0].content.parts[0].text;
                displayBox.innerText = factText;
                speak(factText, 'ar-SA');
            } catch (error) {
                displayBox.innerText = "أنت طفل مبدع! حاول مجدداً لاكتشاف السر.";
                speak(displayBox.innerText, 'ar-SA');
            }
        }

        const main = document.getElementById('main-content');
        const tabs = document.getElementById('nav-tabs');

        animals.forEach((item, idx) => {
            const tabBtn = document.createElement('button');
            tabBtn.className = `px-5 py-2 whitespace-nowrap rounded-full text-sm font-bold transition-all ${idx === 0 ? 'nav-active' : 'bg-gray-100 text-gray-500'}`;
            tabBtn.innerText = item.name;
            tabBtn.onclick = () => {
                document.querySelectorAll('#nav-tabs button').forEach(b => b.className = 'px-5 py-2 whitespace-nowrap rounded-full text-sm font-bold bg-gray-100 text-gray-500');
                tabBtn.className = 'px-5 py-2 whitespace-nowrap rounded-full text-sm font-bold nav-active';
                document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
                document.getElementById(`S-${item.id}`).classList.add('active');
            };
            tabs.appendChild(tabBtn);

            const section = document.createElement('section');
            section.id = `S-${item.id}`;
            section.className = `page-section min-h-[60vh] flex flex-col ${idx === 0 ? 'active' : ''}`;

            if(item.id === 'cover') {
                section.innerHTML = `<div class="text-center my-auto space-y-4">
                    <h1 class="text-5xl font-black text-gray-800 leading-tight">حيوانات الغابة</h1>
                    <p class="text-xl text-purple-600 font-bold italic">مغامرة الألوان الذكية</p>
                    <div class="bg-purple-50 p-6 rounded-3xl border-2 border-purple-100 italic text-purple-700 font-bold">"إلى طفلي المبدع.. أنت فنان الغابة الصغير" ❤️</div>
                </div>`;
            } else if(item.id === 'guide') {
                section.innerHTML = `<div class="bg-white rounded-3xl p-6 shadow-xl border border-gray-50">
                    <h2 class="text-2xl font-black text-purple-600 mb-6 text-center">📖 كيف نلعب؟</h2>
                    <div class="space-y-4 text-gray-700">
                        <p>🎨 لون حيوانك الورقي.</p>
                        <p>📱 امسح الكود لتجده هنا.</p>
                        <p>🔈 اسمع الاسم بالإنجليزي.</p>
                        <p>✨ اكتشف أسرار الغابة بالعربي!</p>
                    </div>
                    <div class="qr-frame"><img src="${qrCodeFileName}" alt="QR" class="w-full" onerror="this.src='https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://narjes-omran.github.io/forest-animals/'"></div>
                </div>`;
            } else if(item.id === 'gift') {
                section.innerHTML = `<div class="text-center my-auto space-y-8">
                    <div class="text-7xl">🎁</div>
                    <h2 class="text-3xl font-black text-gray-800">أحسنت يا بطل!</h2>
                    <button onclick="speak('أحسنت يا فناننا الصغير، نحن نحبك وفخورون بك جداً', 'ar-SA', () => { speak('Well done little artist, we are so proud of you!', 'en-US'); })" 
                        class="btn-magic text-xl shadow-lg">استلم رسالة المحبة ❤️</button>
                </div>`;
            } else {
                section.innerHTML = `
                    <div class="flex justify-between items-center mb-6">
                        <div><h2 class="text-3xl font-black text-gray-800">${item.name}</h2><p class="text-purple-400 uppercase font-black text-xl tracking-tighter">${item.en}</p></div>
                        <button onclick="speak('${item.en}', 'en-US')" class="bg-purple-600 text-white w-14 h-14 rounded-full shadow-lg flex items-center justify-center text-2xl">🔈</button>
                    </div>
                    <div class="flex-grow flex flex-col items-center justify-center bg-gray-50 rounded-[2.5rem] p-4 mb-6 border-4 border-white shadow-inner relative">
                        <img src="${item.img}" class="animal-img mb-4" alt="${item.name}">
                        <div id="info-${item.id}" class="bg-white/95 p-4 rounded-2xl text-purple-900 font-bold text-sm hidden shadow-sm border-r-4 border-purple-500 text-center"></div>
                    </div>
                    <div class="space-y-6">
                        <div class="text-center"><span class="tracing-dots uppercase">${item.en}</span></div>
                        <button onclick="getFact('${item.name}', '${item.id}')" class="btn-magic text-xl shadow-lg">✨ معلومة سحرية</button>
                        <p class="text-center text-gray-400 font-bold text-xs uppercase tracking-widest">🔍 ابحث عن: ${item.search}</p>
                    </div>`;
            }
            main.appendChild(section);
        });
    </script>
</body>
</html>
