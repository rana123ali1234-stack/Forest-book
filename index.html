<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حيوانات الغابة - نرجس عمران</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        body { font-family: 'Cairo', sans-serif; background: #fdfcfe; color: #1e293b; -webkit-tap-highlight-color: transparent; }
        .page-section { display: none; }
        .page-section.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        /* حركة القفزة الضاحكة عند اللمس */
        .animal-img { 
            max-height: 250px; border-radius: 2rem; border: 8px solid white; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.1); transition: 0.3s; cursor: pointer;
        }
        .animal-img:active { animation: bounce 0.5s ease; }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px) scale(1.05); }
        }

        .btn-magic { 
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); 
            color: white; border-radius: 1.25rem; font-weight: bold; padding: 16px; 
            width: 100%; border: none; cursor: pointer; box-shadow: 0 4px 12px rgba(168, 85, 247, 0.3);
        }
        .qr-frame { 
            border: 4px dashed #a855f7; padding: 10px; border-radius: 25px; 
            max-width: 190px; margin: 20px auto; background: white; 
        }
        .nav-active { background-color: #9333ea !important; color: white !important; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <nav class="bg-white shadow-sm sticky top-0 z-50 p-4">
        <div class="max-w-md mx-auto">
            <div class="flex justify-between items-center mb-4 text-purple-600">
                <h1 class="text-2xl font-black">🦁 حيوانات الغابة</h1>
                <span class="text-[10px] bg-amber-50 text-amber-600 px-3 py-1 rounded-full font-bold">بصمة: نرجس عمران</span>
            </div>
            <div id="nav-tabs" class="flex gap-2 overflow-x-auto pb-2 scrollbar-hide"></div>
        </div>
    </nav>

    <main id="main-content" class="flex-grow max-w-md mx-auto w-full p-6"></main>

    <script>
        const myQRCode = "chrome_qrcode_1776215174727.png"; 

        const animals = [
            { id: 'cover', name: '🏠 الغلاف' },
            { id: 'guide', name: '📖 الدليل' },
            { id: 'lion', name: 'الأسد', en: 'LION', search: 'عظمة', img: 'Screenshot_20260414-182747_Chrome.jpg', fact: 'هل تعلم أن زئير الأسد قوي جداً ويمكن سماعه من مسافة ثمانية كيلومترات؟' },
            { id: 'owl', name: 'البومة', en: 'OWL', search: 'هلال', img: 'Screenshot_20260414-212533_Chrome.jpg', fact: 'هل تعلم أن البومة تستطيع تدوير رأسها في دائرة شبه كاملة لتراقب كل الغابة؟' },
            { id: 'elephant', name: 'الفيل', en: 'ELEPHANT', search: 'نملة', img: 'Screenshot_20260414-213329_Chrome.jpg', fact: 'هل تعلم أن الفيل يمتلك ذاكرة قوية جداً ولا ينسى أصدقاءه أبداً؟' },
            { id: 'monkey', name: 'القرد', en: 'MONKEY', search: 'موزة', img: 'Screenshot_20260414-221054_Chrome.jpg', fact: 'هل تعلم أن القرد ذكي جداً ويستخدم يديه ببراعة مثل الإنسان؟' },
            { id: 'giraffe', name: 'الزرافة', en: 'GIRAFFE', search: 'طائر', img: 'images.jpeg', fact: 'هل تعلم أن الزرافة هي أطول حيوان في العالم، وقلبها قوي جداً؟' },
            { id: 'gift', name: '🎁 مفاجأة' }
        ];

        function speak(text, lang) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = lang;
            msg.rate = 0.8;
            window.speechSynthesis.speak(msg);
        }

        const main = document.getElementById('main-content');
        const tabs = document.getElementById('nav-tabs');

        animals.forEach((item, idx) => {
            const btn = document.createElement('button');
            btn.className = `px-5 py-2 whitespace-nowrap rounded-full text-sm font-bold ${idx === 0 ? 'nav-active' : 'bg-gray-100 text-gray-500'}`;
            btn.innerText = item.name;
            btn.onclick = () => {
                document.querySelectorAll('#nav-tabs button').forEach(b => b.className = 'px-5 py-2 whitespace-nowrap rounded-full text-sm font-bold bg-gray-100 text-gray-500');
                btn.className = 'px-5 py-2 whitespace-nowrap rounded-full text-sm font-bold nav-active';
                document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
                document.getElementById(`S-${item.id}`).classList.add('active');
            };
            tabs.appendChild(btn);

            const sec = document.createElement('section');
            sec.id = `S-${item.id}`;
            sec.className = `page-section min-h-[60vh] flex flex-col ${idx === 0 ? 'active' : ''}`;

            if(item.id === 'cover') {
                sec.innerHTML = `<div class="text-center my-auto"><h1 class="text-5xl font-black text-gray-800 mb-2">حيوانات الغابة</h1><p class="text-xl text-purple-600 font-bold mb-6 italic">مغامرة الألوان الذكية</p><div class="bg-purple-50 p-6 rounded-3xl border-2 border-purple-100 font-bold text-purple-700 italic shadow-inner">"إلى طفلي المبدع.. أنت فنان الغابة الصغير" ❤️</div></div>`;
            } else if(item.id === 'guide') {
                sec.innerHTML = `<div class="bg-white rounded-3xl p-6 shadow-lg border border-gray-50 text-center"><h2 class="text-2xl font-bold text-purple-600 mb-4 italic">📖 دليل المغامر</h2><div class="space-y-4 text-gray-700 text-right"><p>🎨 لون حيوانك في الكتاب.</p><p>📱 امسح الكود لتجده هنا.</p><p>🔈 اسمع الاسم بالإنجليزي.</p><p>✨ اكتشف أسرار الغابة بالعربي!</p></div><div class="qr-frame"><img src="${myQRCode}" class="w-full h-auto rounded-lg"></div></div>`;
            } else if(item.id === 'gift') {
                sec.innerHTML = `<div class="text-center my-auto"><div class="text-7xl mb-6">🎁</div><h2 class="text-3xl font-black text-gray-800 mb-8">أحسنت يا بطل!</h2><button onclick="speak('أحسنت يا فناننا الصغير، نحن فخورون بك جداً', 'ar-SA')" class="btn-magic text-xl mb-4">رسالة المحبة (بالعربية) ❤️</button><button onclick="speak('Great job little artist, we are so proud of you!', 'en-US')" class="btn-magic text-xl opacity-80">Message (English) 🇺🇸</button></div>`;
            } else {
                sec.innerHTML = `<div class="flex justify-between items-center mb-6"><div><h2 class="text-3xl font-bold">${item.name}</h2><p class="text-purple-400 uppercase font-black">${item.en}</p></div><button onclick="speak('${item.en}', 'en-US')" class="bg-purple-600 text-white w-12 h-12 rounded-full shadow-lg text-xl">🔈</button></div><div class="flex-grow flex flex-col items-center justify-center bg-gray-50 rounded-[2rem] p-4 mb-6 border-4 border-white shadow-inner relative"><img src="${item.img}" class="animal-img mb-4" onclick="this.style.animation='bounce 0.5s ease'"> <div id="info-${item.id}" class="bg-white/95 p-4 rounded-xl text-purple-900 font-bold text-sm hidden shadow-sm border-r-4 border-purple-500 text-center mx-2"></div></div><div class="space-y-4 text-center"><p class="text-gray-300 text-2xl tracking-[10px] uppercase font-bold border-b-2 border-dashed inline-block">${item.en}</p><button onclick="const b=document.getElementById('info-${item.id}'); b.classList.remove('hidden'); b.innerText='${item.fact}'; speak('${item.fact}', 'ar-SA')" class="btn-magic text-xl">✨ معلومة سحرية</button></div>`;
            }
            main.appendChild(sec);
        });
    </script>
</body>
</html>
