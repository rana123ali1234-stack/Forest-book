<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مرسم نرجس عمران المطور</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        body { font-family: 'Cairo', sans-serif; background: #fdfcfe; overflow-x: hidden; scroll-behavior: smooth; }
        
        /* السحب العمودي الانسيابي */
        .page-view { 
            min-height: 100vh; width: 100vw; display: flex; flex-direction: column; 
            padding-bottom: 120px; border-bottom: 10px dashed #f3e8ff; position: relative;
        }

        /* نبض الحيوان واللوحة */
        .pulse-box { animation: pulseAnim 3s infinite ease-in-out; }
        @keyframes pulseAnim { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.03); } }

        /* الرسام (Canvas) */
        .canvas-container { 
            position: relative; width: 320px; height: 320px; margin: 10px auto; 
            background: white; border-radius: 30px; border: 8px solid #a855f7; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden; touch-action: none;
        }
        canvas { position: absolute; top: 0; left: 0; z-index: 30; cursor: crosshair; }
        .animal-img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain; z-index: 10; pointer-events: none; opacity: 0.7; }

        /* شريط الأدوات */
        .toolbar { display: flex; justify-content: center; gap: 12px; background: rgba(255,255,255,0.9); padding: 15px; border-top: 3px solid #f3e8ff; position: fixed; bottom: 0; width: 100%; z-index: 100; backdrop-filter: blur(5px); }
        .dot { width: 45px; height: 45px; border-radius: 50%; border: 3px solid white; box-shadow: 0 3px 6px rgba(0,0,0,0.1); transition: 0.2s; }
        .active-dot { border-color: #a855f7; transform: scale(1.15); }
        
        /* خط التتبع */
        .trace-font { font-family: sans-serif; font-size: 2.5rem; letter-spacing: 5px; color: transparent; -webkit-text-stroke: 1px #ddd; font-weight: 900; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 5; pointer-events: none; }
    </style>
</head>
<body>

    <section class="page-view text-center bg-purple-50">
        <div class="my-auto">
            <h1 class="text-4xl font-black text-purple-700 mb-6">مرسم الغابة الذكي</h1>
            <img src="https://img.freepik.com/free-vector/wild-animals-coloring-page_23-2148854378.jpg" class="w-72 mx-auto rounded-3xl shadow-2xl pulse-box mb-8">
            <p class="text-xl font-bold text-purple-400">اسحب للأعلى لتبدأ الرسم 👇</p>
            <p class="mt-4 font-bold text-gray-400">نرجس عمران</p>
        </div>
    </section>

    <section class="page-view text-center px-6">
        <div class="my-auto">
            <h2 class="text-3xl font-black mb-6 italic">دليل الرسام الصغير 📖</h2>
            <div class="space-y-4 text-right">
                <p class="bg-white p-4 rounded-2xl shadow-sm border-r-8 border-purple-500 font-bold">🎨 <span class="text-purple-600">ارسم:</span> حرك إصبعك فوق الحيوان لتلونه.</p>
                <p class="bg-white p-4 rounded-2xl shadow-sm border-r-8 border-blue-500 font-bold">🔈 <span class="text-blue-600">اسمع:</span> اضغط على السماعة لسماع الاسم بالإنجليزية.</p>
                <p class="bg-white p-4 rounded-2xl shadow-sm border-r-8 border-orange-500 font-bold">✨ <span class="text-orange-600">تعلم:</span> اضغط لسماع حقيقة مدهشة بالإنجليزية.</p>
            </div>
            <p class="mt-10 animate-bounce">اسحب للأعلى 👇</p>
        </div>
    </section>

    <div id="animal-pages"></div>

    <section class="page-view text-center bg-purple-50">
        <div class="my-auto px-6">
            <h2 class="text-6xl mb-6">🎁</h2>
            <h3 class="text-2xl font-black mb-8 uppercase text-purple-700 italic">You are an Amazing Artist!</h3>
            
            <button onclick="playSong()" class="bg-purple-600 text-white w-full py-5 rounded-3xl font-bold shadow-2xl text-xl flex items-center justify-center gap-3">
                <span>🎶 اسمع أغنية نرجس 🎶</span>
            </button>
            
            <div class="mt-12 bg-white p-4 rounded-2xl shadow-lg border w-40 mx-auto">
                <p class="text-xs font-bold text-gray-400 mb-2">رمز إبداعك</p>
                <img src="chrome_qrcode_1776215174727.png" class="w-full">
            </div>
        </div>
    </section>

    <div class="toolbar">
        <button class="dot bg-red-500 active-dot" onclick="pickColor('#ef4444', this)"></button>
        <button class="dot bg-blue-500" onclick="pickColor('#3b82f6', this)"></button>
        <button class="dot bg-yellow-400" onclick="pickColor('#facc15', this)"></button>
        <button class="dot bg-green-500" onclick="pickColor('#22c55e', this)"></button>
        <button class="text-4xl" onclick="clearCurrent()">🗑️</button>
    </div>

    <script>
        let currentColor = '#ef4444', contexts = [];
        const bookData = [
            { name: 'الأسد', en: 'LION', search: 'العظمة', img: 'Screenshot_20260414-182747_Chrome.jpg', fact: 'The lion is the king of the jungle, he is very strong' },
            { name: 'البومة', en: 'OWL', search: 'الهلال', img: 'Screenshot_20260414-212533_Chrome.jpg', fact: 'The owl sleeps during the day and wakes up at night' },
            { name: 'الفيل', en: 'ELEPHANT', search: 'النملة', img: 'Screenshot_20260414-213329_Chrome.jpg', fact: 'The elephant has a very long trunk and a smart memory' },
            { name: 'القرد', en: 'MONKEY', search: 'الموزة', img: 'Screenshot_20260414-221054_Chrome.jpg', fact: 'The monkey loves jumping and eating sweet bananas' },
            { name: 'الزرافة', en: 'GIRAFFE', search: 'العصفورة', img: 'images.jpeg', fact: 'The giraffe has a very long neck to reach the trees' }
        ];

        function init() {
            const container = document.getElementById('animal-pages');
            bookData.forEach((p, i) => {
                const sec = document.createElement('section');
                sec.className = 'page-view';
                sec.innerHTML = `
                    <div class="p-4 flex justify-between items-center bg-white shadow-sm sticky top-0 z-50">
                        <h2 class="text-3xl font-black text-purple-700">${p.name}</h2>
                        <button onclick="talk('${p.en}', 'en-US')" class="bg-purple-100 p-3 rounded-full text-2xl shadow-inner">🔈</button>
                    </div>
                    <div class="canvas-container pulse-box">
                        <div class="trace-font">${p.en}</div>
                        <img src="${p.img}" class="animal-img">
                        <canvas id="canvas-${i}" width="320" height="320"></canvas>
                    </div>
                    <div class="text-center px-6 mt-4">
                        <div class="bg-orange-50 text-orange-600 p-3 rounded-2xl font-bold mb-4 shadow-inner italic">🔍 ابحث عن: ${p.search}</div>
                        <button onclick="talk('${p.fact}', 'en-US')" class="bg-purple-600 text-white px-8 py-3 rounded-2xl font-bold shadow-lg flex items-center mx-auto gap-2">
                            <span>✨ Listen Magic Fact (EN)</span>
                        </button>
                    </div>
                `;
                container.appendChild(sec);
                setupCanvas(i);
            });
        }

        function setupCanvas(idx) {
            setTimeout(() => {
                const cvs = document.getElementById('canvas-'+idx);
                const ctx = cvs.getContext('2d');
                ctx.lineCap = 'round'; ctx.lineWidth = 15;
                contexts.push(ctx);

                const getPos = (e) => {
                    const r = cvs.getBoundingClientRect();
                    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                    return { x: clientX - r.left, y: clientY - r.top };
                };

                const start = (e) => { 
                    if(e.type === 'touchstart') e.preventDefault();
                    const {x, y} = getPos(e);
                    ctx.beginPath(); ctx.moveTo(x, y);
                    cvs.isDrawing = true;
                };

                const move = (e) => {
                    if(!cvs.isDrawing) return;
                    if(e.type === 'touchmove') e.preventDefault();
                    const {x, y} = getPos(e);
                    ctx.strokeStyle = currentColor;
                    ctx.lineTo(x, y); ctx.stroke();
                };

                const stop = () => { cvs.isDrawing = false; };

                cvs.addEventListener('mousedown', start);
                cvs.addEventListener('mousemove', move);
                window.addEventListener('mouseup', stop);
                cvs.addEventListener('touchstart', start, {passive: false});
                cvs.addEventListener('touchmove', move, {passive: false});
                cvs.addEventListener('touchend', stop);
            }, 500);
        }

        function pickColor(c, btn) { 
            currentColor = c; 
            document.querySelectorAll('.dot').forEach(d => d.classList.remove('active-dot'));
            btn.classList.add('active-dot');
        }

        function clearCurrent() { contexts.forEach(ctx => ctx.clearRect(0,0,320,320)); }

        function talk(msg, lang) {
            window.speechSynthesis.cancel();
            const s = new SpeechSynthesisUtterance(msg);
            s.lang = lang; s.rate = 0.8;
            window.speechSynthesis.speak(s);
        }

        function playSong() {
            const song = "Yellow and Red, Green and Blue. Animals are happy, and colors too! I can draw a lion, I can draw a sun. Coloring with Narjes is so much fun!";
            talk(song, "en-US");
        }

        window.onload = init;
    </script>
</body>
</html>
