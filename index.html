<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حيوانات الغابة - نرجس عمران</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');
        body { font-family: 'Cairo', sans-serif; background-color: #fdfcfe; }
        .page-section { display: none; }
        .page-section.active { display: block; }
        .animal-img { max-height: 300px; border-radius: 2rem; border: 6px solid white; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .btn-magic { background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); color: white; padding: 15px; border-radius: 15px; font-weight: bold; width: 100%; }
        .tracing-dots { letter-spacing: 10px; font-size: 3rem; color: #e2e8f0; border-bottom: 2px dashed #cbd5e1; }
    </style>
</head>
<body class="min-h-screen">

    <nav class="bg-white shadow-md p-4 sticky top-0 z-50">
        <div class="flex justify-between items-center mb-2">
            <h1 class="text-xl font-bold text-purple-600">🦁 حيوانات الغابة</h1>
            <span class="text-[10px] bg-purple-100 px-2 py-1 rounded">نرجس عمران</span>
        </div>
        <div class="flex gap-2 overflow-x-auto" id="nav-tabs"></div>
    </nav>

    <main class="max-w-xl mx-auto p-6" id="main-content"></main>

    <script>
        const apiKey = "AIzaSyCWHwOi9sUjLW-FHgwJ_723axMY8Y5SEwE";
        
        const animals = [
            { id: 'cover', name: '🏠 الغلاف' },
            { id: 'guide', name: '📖 الدليل' },
            { id: 'lion', name: 'الأسد', en: 'LION', search: 'عظمة', img: 'Screenshot_20260414-182747_Chrome.jpg' },
            { id: 'owl', name: 'البومة', en: 'OWL', search: 'هلال', img: 'Screenshot_20260414-212533_Chrome.jpg' },
            { id: 'elephant', name: 'الفيل', en: 'ELEPHANT', search: 'نملة', img: 'Screenshot_20260414-213329_Chrome.jpg' },
            { id: 'monkey', name: 'القرد', en: 'MONKEY', search: 'موزة', img: 'Screenshot_20260414-221054_Chrome.jpg' },
            { id: 'giraffe', name: 'الزرافة', en: 'GIRAFFE', search: 'طائر', img: 'images.jpeg' },
            { id: 'gift', name: '🎁 مفاجأة' }
        ];

        function speakText(text, lang) {
            window.speechSynthesis.cancel(); // إلغاء أي صوت سابق
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = lang;
            msg.rate = 0.8;
            window.speechSynthesis.speak(msg);
            return msg;
        }

        async function getFact(animalName, id) {
            const box = document.getElementById(`info-${id}`);
            box.innerText = "أسأل حكيم الغابة... 🧘‍♂️";
            box.classList.remove('hidden');

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: `أعطني معلومة مذهلة وحقيقية عن حيوان ${animalName} للأطفال باللغة العربية. ابدأ بـ هل تعلم؟` }] }] })
                });
                const data = await response.json();
                const text = data.candidates[0].content.parts[0].text;
                box.innerText = text;
                speakText(text, 'ar-SA');
            } catch (e) {
                box.innerText = "هل تعلم أنك طفل ذكي جداً؟ حاول مرة أخرى!";
                speakText(box.innerText, 'ar-SA');
            }
        }

        const main = document.getElementById('main-content');
        const tabs = document.getElementById('nav-tabs');

        animals.forEach((item, idx) => {
            // إنشاء التبويبات
            const btn = document.createElement('button');
            btn.className = `px-4 py-2 whitespace-nowrap rounded-full text-sm font-bold ${idx===0?'bg-purple-600 text-white':'bg-gray-100'}`;
            btn.innerText = item.name;
            btn.onclick = () => {
                document.querySelectorAll('#nav-tabs button').forEach(b => { b.classList.remove('bg-purple-600', 'text-white'); b.classList.add('bg-gray-100'); });
                btn.classList.add('bg-purple-600', 'text-white');
                document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
                document.getElementById(`S-${item.id}`).classList.add('active');
            };
            tabs.appendChild(btn);

            // إنشاء الصفحات
            const sec = document.createElement('section');
            sec.id = `S-${item.id}`;
            sec.className = `page-section bg-white rounded-3xl p-6 shadow-lg min-h-[60vh] flex flex-col ${idx===0?'active':''}`;

            if(item.id === 'cover') {
                sec.innerHTML = `<div class="text-center my-auto">
                    <h1 class="text-5xl font-black text-gray-800 mb-4">حيوانات الغابة</h1>
                    <p class="text-xl text-purple-600 font-bold mb-6">مغامرة الألوان الذكية</p>
                    <div class="bg-purple-50 p-4 rounded-xl border-2 border-purple-100 italic text-purple-700 font-bold">"إلى طفلي المبدع.. أنت فنان الغابة الصغير" ❤️</div>
                </div>`;
            } else if(item.id === 'guide') {
                sec.innerHTML = `<h2 class="text-2xl font-bold text-purple-600 mb-4">📖 كيف نلعب؟</h2>
                    <div class="space-y-4 text-gray-700">
                        <p>🎨 لون في كتابك الورقي.</p>
                        <p>📱 امسح الكود لتجد الصورة هنا.</p>
                        <p>🔈 اضغط لسماع الاسم بالإنجليزية.</p>
                        <p>✨ اضغط للمعلومات السحرية بالعربية.</p>
                    </div>
                    <div class="mt-8 p-4 border-2 border-dashed border-purple-300 rounded-2xl text-center">
                        <p class="text-xs text-gray-400 mb-2">ضع صورة الكود هنا في Canva</p>
                        <div class="bg-gray-100 h-32 flex items-center justify-center text-gray-400">QR CODE</div>
                    </div>`;
            } else if(item.id === 'gift') {
                sec.innerHTML = `<div class="text-center my-auto">
                    <div class="text-6xl mb-4">🥳</div>
                    <h2 class="text-3xl font-bold mb-6">أحسنت يا بطل!</h2>
                    <button onclick="const m = speakText('أحسنت يا فناننا الصغير، نحن فخورون بك جداً', 'ar-SA'); m.onend = () => speakText('Well done little artist, we are so proud of you!', 'en-US');" 
                        class="btn-magic text-xl p-8">🎁 اضغط لاستلام الهدية</button>
                </div>`;
            } else {
                sec.innerHTML = `
                    <div class="flex justify-between items-center mb-6">
                        <div><h2 class="text-3xl font-bold">${item.name}</h2><p class="text-gray-400 uppercase font-bold">${item.en}</p></div>
                        <button onclick="speakText('${item.en}', 'en-US')" class="bg-purple-600 text-white w-12 h-12 rounded-full shadow-lg text-xl">🔈</button>
                    </div>
                    <div class="flex-grow flex flex-col items-center justify-center bg-gray-50 rounded-2xl p-4 mb-4">
                        <img src="${item.img}" class="animal-img mb-4">
                        <div id="info-${item.id}" class="bg-white p-3 rounded-xl text-purple-800 font-bold text-sm hidden shadow-sm text-center"></div>
                    </div>
                    <div class="space-y-4">
                        <div class="text-center"><span class="tracing-dots uppercase">${item.en}</span></div>
                        <button onclick="getFact('${item.name}', '${item.id}')" class="btn-magic">✨ معلومة سحرية</button>
                        <p class="text-center text-gray-400 text-xs">🔍 ابحث عن: ${item.search}</p>
                    </div>`;
            }
            main.appendChild(sec);
        });
    </script>
</body>
</html>
